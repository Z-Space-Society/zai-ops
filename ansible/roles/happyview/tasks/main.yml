---
# Install HappyView natively under systemd as an AT Protocol AppView platform.
# HappyView is a Rust + Next.js project with no official pre-built Linux binaries
# distributed over a plain HTTP URL (Tangled releases use AT Protocol blob storage).
# The role builds from source: installs the Rust toolchain + Node.js 22, clones the
# pinned tag, runs `cargo build --release` for the binary AND `npm run build` (with
# NEXT_PUBLIC_BASE_PATH=/__HAPPYVIEW_BP__) for the static frontend, then cleans both
# build trees to reclaim ~6 GB. Runtime memory is light; the 2 GB CT sizing is for
# compilation headroom.

# --- Provision the happyview role + database on the postgres CT --------------------
# Same idiom as litellm/open-webui: the postgres superuser is peer-only, so all psql
# calls are delegated to the postgres CT. Probe first (psql has no IF NOT EXISTS for
# ROLE or DATABASE), then branch on the result. Password passed via env ($VAR) so
# it never appears in the shell history or process list; no_log keeps it out of the
# Ansible log.

- name: Check whether the happyview Postgres role exists
  ansible.builtin.command:
    cmd: >-
      su - postgres -c
      "psql -tAc \"SELECT 1 FROM pg_roles WHERE rolname = '{{ happyview_db_user }}'\""
  delegate_to: postgres
  register: happyview_role_check
  changed_when: false

- name: Create the happyview Postgres role with a generated password
  ansible.builtin.shell:
    cmd: >-
      su -m postgres -c
      "psql -v ON_ERROR_STOP=1
      -c \"CREATE ROLE {{ happyview_db_user }} LOGIN PASSWORD '\$HAPPYVIEW_DB_PW'\""
  environment:
    HAPPYVIEW_DB_PW: "{{ happyview_db_password }}"
  delegate_to: postgres
  when: happyview_role_check.stdout | trim != "1"
  no_log: true

- name: Ensure the happyview role password matches the generated secret
  # ALTER ROLE always succeeds and only re-hashes — mark unchanged to keep runs quiet.
  ansible.builtin.shell:
    cmd: >-
      su -m postgres -c
      "psql -v ON_ERROR_STOP=1
      -c \"ALTER ROLE {{ happyview_db_user }} LOGIN PASSWORD '\$HAPPYVIEW_DB_PW'\""
  environment:
    HAPPYVIEW_DB_PW: "{{ happyview_db_password }}"
  delegate_to: postgres
  when: happyview_role_check.stdout | trim == "1"
  no_log: true
  changed_when: false

- name: Check whether the happyview database exists
  ansible.builtin.command:
    cmd: >-
      su - postgres -c
      "psql -tAc \"SELECT 1 FROM pg_database WHERE datname = '{{ happyview_db_name }}'\""
  delegate_to: postgres
  register: happyview_db_check
  changed_when: false

- name: Create the happyview database owned by the happyview role
  ansible.builtin.command:
    cmd: >-
      su - postgres -c
      "psql -v ON_ERROR_STOP=1 -c \"CREATE DATABASE {{ happyview_db_name }}
      OWNER {{ happyview_db_user }}\""
  delegate_to: postgres
  when: happyview_db_check.stdout | trim != "1"

# --- Service account + directories ------------------------------------------------

- name: Create the happyview system group
  ansible.builtin.group:
    name: "{{ happyview_group }}"
    system: true

- name: Create the happyview system user
  ansible.builtin.user:
    name: "{{ happyview_user }}"
    group: "{{ happyview_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ happyview_home }}"
    create_home: false

- name: Create the happyview home and config directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ happyview_group }}"
    mode: "{{ item.mode }}"
  loop:
    # home/bin: holds the installed binary (root-owned, world-readable).
    # home/src: build tree, root-owned; removed after build to reclaim disk.
    # config dir: root-owned, holds the 0600 secret env the daemon reads via EnvironmentFile.
    - { path: "{{ happyview_home }}", owner: root, mode: "0755" }
    - { path: "{{ happyview_home }}/bin", owner: root, mode: "0755" }
    - { path: "{{ happyview_config_dir }}", owner: root, mode: "0750" }

# --- Build dependencies -----------------------------------------------------------

- name: Install system build dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - ca-certificates
      - curl
      - git
      - libssl-dev
      - pkg-config
      - unzip
    state: present
    update_cache: true

# Node.js 22 for the Next.js frontend build (web/ uses npm, matching the Dockerfile's
# node:22-alpine stage). NodeSource provides the only reliable Node 22 package for
# Debian — the distro ships an older version that Next.js 15 won't accept.
- name: Set up NodeSource Node.js 22 repository
  ansible.builtin.shell:
    cmd: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js 22
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

# Rust toolchain via rustup — minimal profile to keep install lean (no rust-docs,
# rust-src, etc.). Installed system-wide under /usr/local so the root build can find it.
- name: Check whether the Rust toolchain is installed
  ansible.builtin.command: rustc --version
  register: happyview_rust_installed
  changed_when: false
  failed_when: false
  environment:
    PATH: "/root/.cargo/bin:{{ ansible_env.PATH }}"

- name: Install the Rust toolchain via rustup
  ansible.builtin.shell:
    cmd: >-
      curl -fsSL https://sh.rustup.rs |
      sh -s -- -y --profile minimal --default-toolchain {{ happyview_rust_channel }}
    creates: /root/.cargo/bin/rustc
  when: happyview_rust_installed.rc != 0

# --- Clone + build ----------------------------------------------------------------

- name: Check the checked-out HappyView version
  ansible.builtin.command: git -C "{{ happyview_src }}" describe --tags --exact-match
  register: happyview_src_version
  changed_when: false
  failed_when: false

# Clone on first run or when the pinned version doesn't match what's checked out.
# --depth 1 keeps the clone lean (no full history needed for a build).
- name: Clone HappyView source at the pinned tag
  ansible.builtin.git:
    repo: "{{ happyview_repo_url }}"
    dest: "{{ happyview_src }}"
    version: "v{{ happyview_version }}"
    depth: 1
    force: true
  register: happyview_clone
  when: happyview_src_version.stdout | trim != "v" ~ happyview_version

- name: Check whether the installed binary exists
  ansible.builtin.stat:
    path: "{{ happyview_bin }}"
  register: happyview_bin_stat

- name: Build HappyView from source (cargo build --release)
  # Build when: the clone just updated to a new version, OR the binary isn't installed
  # yet (first run). Skipped otherwise — no creates: guard so the deleted target/ dir
  # doesn't trick it into rebuilding on every idempotent re-run.
  ansible.builtin.command:
    cmd: /root/.cargo/bin/cargo build --release
    chdir: "{{ happyview_src }}"
  environment:
    PATH: "/usr/local/bin:/root/.cargo/bin:{{ ansible_env.PATH }}"
    HOME: /root
  when: (happyview_clone is changed) or (not happyview_bin_stat.stat.exists)
  notify: restart happyview

- name: Install the built binary to {{ happyview_home }}/bin
  ansible.builtin.copy:
    src: "{{ happyview_src }}/target/release/happyview"
    dest: "{{ happyview_bin }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when: (happyview_clone is changed) or (not happyview_bin_stat.stat.exists)
  notify: restart happyview

# --- Frontend build ---------------------------------------------------------------
# The Next.js frontend (web/) is NOT embedded in the Rust binary — there is no
# build.rs. It must be built separately: `npm ci && npm run build` with
# NEXT_PUBLIC_BASE_PATH=/__HAPPYVIEW_BP__ (the sentinel entrypoint.sh replaces at
# first start). The Dockerfile uses a dedicated node:22-alpine stage for this;
# we replicate it here using the Node.js 22 we installed above.

- name: Check whether the frontend static dir is populated
  ansible.builtin.stat:
    path: "{{ happyview_static_dir }}"
  register: happyview_static_stat

- name: Install frontend npm dependencies
  ansible.builtin.command:
    cmd: npm ci
    chdir: "{{ happyview_src }}/web"
  environment:
    PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
    HOME: /root
  when: (happyview_clone is changed) or (not happyview_static_stat.stat.exists)

- name: Build the Next.js frontend
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ happyview_src }}/web"
  environment:
    PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
    HOME: /root
    NEXT_PUBLIC_BASE_PATH: "/__HAPPYVIEW_BP__"
  when: (happyview_clone is changed) or (not happyview_static_stat.stat.exists)

- name: Deploy frontend static files to {{ happyview_static_dir }}
  ansible.builtin.copy:
    src: "{{ happyview_src }}/web/out/"
    dest: "{{ happyview_static_dir }}/"
    remote_src: true
    owner: root
    group: "{{ happyview_group }}"
    mode: "0644"
    directory_mode: "0755"
  when: (happyview_clone is changed) or (not happyview_static_stat.stat.exists)
  notify: restart happyview

- name: Replace /__HAPPYVIEW_BP__ sentinel strings in static files
  # The Next.js build embeds /__HAPPYVIEW_BP__ as a relocatable base-path sentinel.
  # Replace with empty string so all asset paths are rooted at / — the same
  # transformation the Dockerfile's entrypoint.sh applies at container start.
  ansible.builtin.shell:
    cmd: >-
      find "{{ happyview_static_dir }}" -type f
      \( -name '*.html' -o -name '*.js' -o -name '*.css' -o -name '*.txt' \)
      -exec sed -i 's|/__HAPPYVIEW_BP__||g' {} +
  when: (happyview_clone is changed) or (not happyview_static_stat.stat.exists)

- name: Remove frontend node_modules to reclaim disk space
  ansible.builtin.file:
    path: "{{ happyview_src }}/web/node_modules"
    state: absent

- name: Copy migrations to {{ happyview_home }}/migrations
  # HappyView resolves migrations via a relative path ("./migrations/postgres") from
  # its working directory. The unit sets WorkingDirectory={{ happyview_home }}, so
  # the migrations must live there — not in the source tree or next to the binary.
  ansible.builtin.copy:
    src: "{{ happyview_src }}/migrations/"
    dest: "{{ happyview_home }}/migrations/"
    remote_src: true
    owner: root
    group: "{{ happyview_group }}"
    mode: "0644"
    directory_mode: "0755"

- name: Ensure migrations tree is world-readable
  # `copy` with remote_src doesn't reliably set mode on nested subdirectories (the
  # postgres/ subdir can end up root:root 0700 from the git checkout). The happyview
  # user runs with ProtectSystem=strict and needs at least r+x on every directory
  # and r on every file. a+rX (capital X = execute only if already executable) is the
  # minimal safe fix without over-opening anything.
  ansible.builtin.command:
    cmd: chmod -R a+rX "{{ happyview_home }}/migrations"
  changed_when: false

- name: Remove the Cargo build tree to reclaim disk space
  # target/ holds all intermediate objects + deps (~5+ GB). The binary is already
  # installed; keeping this would just waste most of the CT's 16 GB rootfs. The src
  # tree (without target/) is kept for reference and for `git describe` above.
  ansible.builtin.file:
    path: "{{ happyview_src }}/target"
    state: absent

# --- Secret env + unit ------------------------------------------------------------

- name: Render the happyview secret environment file
  ansible.builtin.template:
    src: happyview.env.j2
    dest: "{{ happyview_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart happyview

- name: Install the happyview systemd unit
  ansible.builtin.template:
    src: happyview.service.j2
    dest: /etc/systemd/system/happyview.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart happyview

- name: Ensure happyview is started and enabled
  ansible.builtin.systemd:
    name: happyview
    state: started
    enabled: true
    daemon_reload: true

- name: Apply pending happyview restarts before the smoke test
  ansible.builtin.meta: flush_handlers

- name: Wait for happyview to accept connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ happyview_port }}"
    timeout: 60

- name: Verify the happyview root endpoint responds
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ happyview_port }}/"
    follow_redirects: none
    status_code: [200, 302, 303]
  register: happyview_health
  until: happyview_health is succeeded
  retries: 10
  delay: 3
