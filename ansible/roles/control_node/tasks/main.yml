---
# Control-node (CT 100) base configuration.
#
# The locale is first fixed in bootstrap (before Ansible can even start; see
# bootstrap.sh at the repo root), along with LANG in /etc/environment and the repo
# checkout. We re-assert the locale here, BEFORE the upgrade, so a
# glibc/locales upgrade regenerates locale-archive with en_US.UTF-8 present
# instead of wiping it.

- name: Ensure the en_US.UTF-8 locale is generated
  community.general.locale_gen:
    name: en_US.UTF-8
    state: present

- name: Update apt cache and run a full upgrade
  ansible.builtin.apt:
    update_cache: true
    upgrade: full

# The community.proxmox modules talk to the Proxmox API through proxmoxer.
- name: Install the Proxmox API client library
  ansible.builtin.apt:
    name:
      - python3-proxmoxer
      - python3-requests
    state: present

# Debian's ansible 12 bundles community.proxmox 1.3.0, whose ProxmoxAPI() call
# omits the connection timeout — proxmoxer then defaults to a 5s read timeout
# that the LXC-create POST exceeds on a fresh node. 1.6.0+ adds the api_timeout
# option provision.yml relies on. Installing into ~/.ansible/collections (the
# default galaxy path) shadows the dist-packages 1.3.0, which sits LAST in
# Ansible's search order. Pin lives in requirements.yml beside ansible.cfg.
#
# Use ansible-galaxy directly, not community.general.ansible_galaxy_install: that
# module treats the collection as "present" when it finds ANY version (the
# dist-packages 1.3.0) and skips, so it never performs the upgrade. `--upgrade`
# forces galaxy to honour the version range and pull >=1.6.0 over the top.
- name: Install/upgrade pinned Ansible collections on the control node
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r {{ playbook_dir }}/requirements.yml --upgrade
  register: galaxy_collections
  # galaxy prints "Installing '<name>:<ver>' to ..." only when it actually writes
  # a collection; "Nothing to do." otherwise. Keeps re-runs from reporting changed.
  changed_when: "'Installing ' in galaxy_collections.stdout"

# Operator diagnostics. debian-13-standard ships minimal — no curl/jq — so the
# control node can't probe a service CT's HTTP health endpoint by hand (the
# playbooks use ansible.builtin.uri, but an operator at a shell reaches for curl).
# Install them here so `curl http://10.1.1.<ctid>:4000/health/...` just works.
- name: Install operator diagnostic CLI tools
  ansible.builtin.apt:
    name:
      - curl
      - jq
    state: present

# Service CTs are created with this public key injected into their root
# authorized_keys (the proxmox module's `pubkey`), so Ansible can SSH in over
# the internal network afterward. Idempotent: only generates if absent.
- name: Ensure root has an ed25519 SSH keypair to inject into service CTs
  ansible.builtin.user:
    name: root
    generate_ssh_key: true
    ssh_key_type: ed25519
    ssh_key_file: .ssh/id_ed25519

# The vault password sits beside the vault on CT 100 by design (host root is the
# trust boundary). Defense-in-depth: assert it stays root-only so permission
# drift gets caught. The bootstrap writes it with umask 077 already.
- name: Assert the vault password file is root-only
  ansible.builtin.file:
    path: /root/.vault_pass
    mode: "0600"
    owner: root
    group: root

# Operator commands (zai-assign, zai-backup, …) live in the repo's bin/ and run
# in place — nothing is copied to /usr/local/bin, so the command you run is always
# the one in git and a `git pull` is enough to update it. Put bin/ on PATH so
# they're discoverable as `zai-*`. Bootstrap seeds these same hooks (so a fresh
# `pct enter` works before site.yml runs); we re-assert them here as the owning
# role — same seed-then-own pattern as the locale above.
- name: Put the repo's bin/ on PATH (login shells via /etc/profile.d)
  ansible.builtin.copy:
    dest: /etc/profile.d/zai-ops.sh
    owner: root
    group: root
    mode: "0644"
    # Guard against re-prepending in nested shells so PATH doesn't grow.
    content: |
      # Managed by zai-ops. Operator commands (zai-assign, zai-backup) live in the repo.
      case ":$PATH:" in
        *:/opt/zai-ops/bin:*) ;;
        *) export PATH="/opt/zai-ops/bin:$PATH" ;;
      esac
      # Land in the repo on a fresh login/pct-enter, without moving a shell
      # that has already navigated elsewhere.
      [ "$PWD" = "$HOME" ] && [ -d /opt/zai-ops ] && cd /opt/zai-ops

# `pct enter` gives an interactive *non-login* shell, which skips /etc/profile.d
# entirely — so the snippet above never loads there. Interactive non-login bash
# does read /etc/bash.bashrc on Debian, so source the snippet from there too.
- name: Put the repo's bin/ on PATH (interactive non-login shells via /etc/bash.bashrc)
  ansible.builtin.blockinfile:
    path: /etc/bash.bashrc
    marker: "# {mark} ANSIBLE MANAGED — zai-ops PATH"
    block: |
      [ -r /etc/profile.d/zai-ops.sh ] && . /etc/profile.d/zai-ops.sh

# Home for auto-generated runtime secrets (object-store key, restic repo
# password, …). The `password` lookup writes them here on first use; creating it
# 0700 up front guarantees they land root-only. Same posture as /root/.vault_pass
# — plaintext on CT 100, with host root as the trust boundary. Part of the
# control node's restored state: see docs/roles/backup.md.
- name: Ensure the generated-secrets directory exists (root-only)
  ansible.builtin.file:
    path: /root/.zai-secrets
    state: directory
    owner: root
    group: root
    mode: "0700"
