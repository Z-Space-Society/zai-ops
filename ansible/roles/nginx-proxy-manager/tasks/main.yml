---
# Install Nginx Proxy Manager (NPM) natively — no Docker (CLAUDE.md pinned).
# NPM has no apt package, so we add the OpenResty + Node 18 repos, then run a
# version-aware build script that reproduces NPM's dockerless assembly. The build
# lives in npm-build.sh (like object_store's garage-init.sh) because it's an
# inherently shell-shaped, vendored multi-step build; Ansible owns everything
# around it (repos, dirs, config, unit, services).
#
# Order matters: configure the NodeSource + OpenResty repos BEFORE any apt cache
# update. The OpenResty repo file is (re)written here too, so a re-run after a
# failed attempt that left a stale (trixie) openresty.sources self-heals — the
# bookworm suite lands before the first `apt update` instead of wedging on it.

- name: Ensure the apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

# Both repos are signed by ASCII-armored keys; apt reads .asc files via signed-by
# directly, so no dearmor step is needed.
- name: Install the NodeSource and OpenResty signing keys
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
      dest: /etc/apt/keyrings/nodesource.asc
    - url: https://openresty.org/package/pubkey.gpg
      dest: /etc/apt/keyrings/openresty.asc

- name: Add the NodeSource (Node {{ npm_node_major }}) apt repository
  ansible.builtin.deb822_repository:
    name: nodesource
    types: deb
    uris: "https://deb.nodesource.com/node_{{ npm_node_major }}.x"
    suites: nodistro
    components: main
    signed_by: /etc/apt/keyrings/nodesource.asc

# Pin nodejs to NodeSource. Debian 13 ships a *newer* nodejs (20.x) than our
# pinned NodeSource 18.x, so without this apt prefers Debian's by version and
# (a) silently breaks the Node-18 pin and (b) leaves no `npm` — Debian splits npm
# into its own package, while NodeSource's nodejs bundles it. Priority > 1000 so
# apt installs NodeSource's nodejs even though it's a downgrade from Debian's.
- name: Pin nodejs to the NodeSource repository
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/nodesource.pref
    mode: "0644"
    content: |
      # Managed by Ansible (nginx-proxy-manager role). See tasks/main.yml.
      Package: nodejs
      Pin: origin deb.nodesource.com
      Pin-Priority: 1001

# OpenResty publishes per Debian codename but has no trixie repo yet, so pin
# npm_openresty_suite (bookworm). It installs cleanly on trixie because OpenResty
# bundles its own PCRE/OpenSSL — see the var comment in defaults/main.yml.
- name: Add the OpenResty apt repository
  ansible.builtin.deb822_repository:
    name: openresty
    types: deb
    uris: "http://openresty.org/package/debian"
    suites: "{{ npm_openresty_suite }}"
    components: openresty
    signed_by: /etc/apt/keyrings/openresty.asc

# Debian 13's apt verifies repo signatures with Sequoia (`sqv`), whose policy
# rejects SHA1 key self-signatures from 2026-02-01. OpenResty's signing key is
# SHA1-bound, so sqv reports the (correctly signed) repo as "not signed" and the
# apt update wedges. Point apt at the classic GnuPG verifier (`gpgv`) instead:
# it still verifies the signature against the pinned key, but accepts SHA1
# self-sigs, so authenticity is preserved without disabling verification. This
# applies to every repo on the CT; that's fine — gpgv verifies the others too.
- name: Use gpgv (not Sequoia sqv) for apt signature verification
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99-zai-gpgv
    mode: "0644"
    content: |
      // Managed by Ansible (nginx-proxy-manager role). See tasks/main.yml.
      APT::Key::gpgvcommand "gpgv";

# Single apt update, now that both repos are correct. Base build/runtime deps
# plus OpenResty land together. nodejs is handled separately just below.
- name: Install base deps and OpenResty
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - git
      - build-essential
      - python3
      - sqlite3
      - logrotate
      - rsync
      - openresty
    state: present
    update_cache: true

# nodejs gets its own task because the NodeSource pin can only *choose* the
# candidate — it can't replace an already-installed package whose version differs.
# A CT left with Debian's nodejs (no bundled npm) from an earlier run, or with a
# previous NodeSource major, would never switch under `state: present` (a no-op
# for installed packages). `state: latest` reconciles to the pinned candidate
# (NodeSource's npm_node_major, which carries npm) and `allow_downgrade` permits
# the change in either direction. Idempotent once on the pinned major.
- name: Install Node.js from NodeSource (reconcile to the pinned major)
  ansible.builtin.apt:
    name: nodejs
    state: latest
    allow_downgrade: true

- name: Install yarn (NPM's package manager) at the pinned version
  ansible.builtin.command: "npm install -g yarn@{{ npm_yarn_version }}"
  args:
    creates: "/usr/lib/node_modules/yarn/package.json"

- name: Create the source/scratch directory
  ansible.builtin.file:
    path: "{{ npm_src_dir }}"
    state: directory
    mode: "0755"

# /data is the runtime state — the SQLite DB, per-host nginx config and any
# uploaded certs. It's what the backup role's Tier-2 wiring captures.
- name: Create the NPM data tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ npm_data_dir }}"
    - "{{ npm_data_dir }}/nginx"
    - "{{ npm_data_dir }}/nginx/proxy_host"
    - "{{ npm_data_dir }}/custom_ssl"
    - "{{ npm_data_dir }}/logs"
    - "{{ npm_data_dir }}/access"
    - "{{ npm_app_dir }}/config"
    - /var/www/html
    - /tmp/nginx/body
    - /var/cache/nginx/proxy_temp

- name: Render the backend database config (SQLite at {{ npm_data_dir }})
  ansible.builtin.template:
    src: production.json.j2
    dest: "{{ npm_app_dir }}/config/production.json"
    mode: "0644"
  notify: restart npm

- name: Install the NPM build script
  ansible.builtin.template:
    src: npm-build.sh.j2
    dest: /usr/local/bin/npm-build.sh
    mode: "0700"

# Version-aware: the script no-ops when the installed marker already matches
# npm_version, so a re-run is a no-op and a deliberate bump triggers a rebuild.
- name: Build and stage NPM v{{ npm_version }}
  ansible.builtin.command: /usr/local/bin/npm-build.sh
  register: npm_build
  changed_when: "'already installed' not in npm_build.stdout"
  notify: restart npm

- name: Install the npm systemd unit
  ansible.builtin.template:
    src: npm.service.j2
    dest: /etc/systemd/system/npm.service
    mode: "0644"
  notify:
    - reload systemd
    - restart npm

- name: Install the NPM log rotation policy
  ansible.builtin.template:
    src: npm.logrotate.j2
    dest: /etc/logrotate.d/npm
    mode: "0644"

# Flush so the unit/build are live before we validate and assert reachability.
- name: Apply pending restarts before validation
  ansible.builtin.meta: flush_handlers

- name: Ensure OpenResty and NPM are started and enabled
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - openresty
    - npm

- name: Validate the assembled OpenResty configuration
  ansible.builtin.command: /usr/sbin/nginx -t
  changed_when: false
