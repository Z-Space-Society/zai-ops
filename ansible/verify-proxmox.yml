---
# Read-only smoke test: confirms the Proxmox API token authenticates from the
# control node before running the heavier create plays. Run after site.yml:
#
#   ansible-playbook verify-proxmox.yml
#
# Green (failed=0, nodes listed) means the whole chain works: pveum mint ->
# encrypted vault -> /root/.vault_pass -> API auth.
#
# Uses community.proxmox (the proxmox modules moved here from community.general,
# which deprecated its copies). Requires the python3-proxmoxer library on the
# control node — installed by the control_node role.

- name: Verify Proxmox API access from the control node
  hosts: control_node
  gather_facts: false
  tasks:
    - name: Query Proxmox nodes via the API token
      community.proxmox.proxmox_node_info:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
        # Proxmox serves a self-signed cert; keep validation off. Explicit because
        # community.proxmox 2.0.0 flips the default to true (see provision.yml).
        validate_certs: false
      register: pve_nodes

    - name: Show reachable nodes
      ansible.builtin.debug:
        var: pve_nodes.proxmox_nodes
