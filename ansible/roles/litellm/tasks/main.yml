---
# Install LiteLLM proxy natively from a dedicated venv (Debian 13 enforces PEP 668,
# so the system interpreter is externally-managed — we never pip into it). The
# proxy is a Python app run under systemd as an unprivileged user, fronting the
# inference nodes + external providers with an OpenAI-compatible API.
#
# Ordering is load-bearing: LiteLLM runs Prisma DB migrations on its FIRST start,
# so the `litellm` Postgres role + database (on the postgres CT) and a valid
# DATABASE_URL must exist BEFORE the service comes up. We provision the DB first,
# render config/env, install the unit, then flush handlers to start the daemon.
# This play runs AFTER the postgres play (provision.yml ordering), so the server
# is already up with scram-sha-256 password_encryption when we set the role's pw.

# --- Provision the litellm role + database on the postgres CT ---------------
# The postgres CT is a BARE server: its superuser has no password and is reachable
# only via local peer auth (`su - postgres -c psql`) ON that CT — NOT as a
# superuser over TCP. So we delegate these psql calls to the postgres host and run
# them as the postgres OS user. We deliberately DON'T use community.postgresql:
# that would need the collection + psycopg2 installed on the postgres CT and STILL
# need a superuser connection method, which over TCP doesn't exist. delegate_to +
# peer psql is the connection the box already grants — the same idiom the backup
# role's pg_dumpall and the postgres role's own verify use.

- name: Check whether the litellm Postgres role exists
  # psql has no CREATE ROLE IF NOT EXISTS, so probe first and branch. -tAc returns
  # a bare scalar ("1" on a match, empty otherwise). No secret here, so a clean
  # login shell (su -) like the postgres role uses is fine.
  ansible.builtin.command:
    cmd: >-
      su - postgres -c
      "psql -tAc \"SELECT 1 FROM pg_roles WHERE rolname = '{{ litellm_db_user }}'\""
  delegate_to: postgres
  register: litellm_role_check
  changed_when: false

- name: Create the litellm Postgres role with a generated password
  # Only when the probe found nothing. psql does NOT interpolate :'var' in a -c
  # string (that only happens for stdin/-f input), so the password is inlined into
  # the SQL and quoted by hand — safe because litellm_db_password is pure hex
  # (chars=digits,abcdef), so it can't break the single-quoted literal. It reaches
  # the postgres shell as $LITELLM_DB_PW (the \$ keeps the OUTER shell from
  # expanding it, so the secret isn't baked into the templated command string);
  # su -m preserves the env var the postgres user's shell then expands. no_log
  # keeps the rendered secret out of the Ansible log.
  ansible.builtin.shell:
    cmd: >-
      su -m postgres -c
      "psql -v ON_ERROR_STOP=1
      -c \"CREATE ROLE {{ litellm_db_user }} LOGIN PASSWORD '\$LITELLM_DB_PW'\""
  environment:
    LITELLM_DB_PW: "{{ litellm_db_password }}"
  delegate_to: postgres
  when: litellm_role_check.stdout | trim != "1"
  no_log: true

- name: Ensure the litellm role password matches the generated secret
  # Covers a rotated secret: ALTER ROLE always succeeds and only re-hashes, so it
  # carries no useful "changed" signal — mark it unchanged to keep runs quiet.
  # Same inline-hex quoting as the CREATE above (psql can't interpolate in -c).
  ansible.builtin.shell:
    cmd: >-
      su -m postgres -c
      "psql -v ON_ERROR_STOP=1
      -c \"ALTER ROLE {{ litellm_db_user }} LOGIN PASSWORD '\$LITELLM_DB_PW'\""
  environment:
    LITELLM_DB_PW: "{{ litellm_db_password }}"
  delegate_to: postgres
  when: litellm_role_check.stdout | trim == "1"
  no_log: true
  changed_when: false

- name: Check whether the litellm database exists
  # CREATE DATABASE can't run inside a DO block / transaction, so it can't use a
  # PL/pgSQL guard — probe pg_database, then create conditionally.
  ansible.builtin.command:
    cmd: >-
      su - postgres -c
      "psql -tAc \"SELECT 1 FROM pg_database WHERE datname = '{{ litellm_db_name }}'\""
  delegate_to: postgres
  register: litellm_db_check
  changed_when: false

- name: Create the litellm database owned by the litellm role
  ansible.builtin.command:
    cmd: >-
      su - postgres -c
      "psql -v ON_ERROR_STOP=1 -c \"CREATE DATABASE {{ litellm_db_name }}
      OWNER {{ litellm_db_user }}\""
  delegate_to: postgres
  when: litellm_db_check.stdout | trim != "1"

# --- Native LiteLLM install (venv, PEP 668) ---------------------------------

- name: Create the litellm system group
  ansible.builtin.group:
    name: "{{ litellm_group }}"
    system: true

- name: Create the litellm system user
  ansible.builtin.user:
    name: "{{ litellm_user }}"
    group: "{{ litellm_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ litellm_home }}"
    create_home: false

- name: Create the litellm home and config directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ litellm_group }}"
    mode: "{{ item.mode }}"
  loop:
    # home: owned by the daemon (venv + prisma's writable cache live here).
    # config dir: root-owned, group-readable so the daemon reads config.yaml.
    - { path: "{{ litellm_home }}", owner: "{{ litellm_user }}", mode: "0755" }
    - { path: "{{ litellm_config_dir }}", owner: root, mode: "0750" }

# Debian 13 marks the system Python externally-managed (PEP 668): pip into it is
# refused. python3-venv gives us `python -m venv`; everything LiteLLM needs goes
# into the dedicated venv below, isolated from the OS interpreter.
- name: Install python3-venv and pip
  ansible.builtin.apt:
    name:
      - python3-venv
      - python3-pip
    state: present
    update_cache: true

# pip with virtualenv= both CREATES the venv and installs into it — pip runs INSIDE
# that venv, so PEP 668 doesn't apply (it's not the system environment). prisma is
# installed alongside because litellm[proxy] omits it (it's in the extra_proxy
# extra); pinning both keeps the schema + client deterministic. A bump redeploys
# via the restart handler. PRISMA_SKIP_POSTINSTALL_GENERATE stops prisma's pip
# hook from trying to generate with no schema in scope — we generate explicitly
# below.
- name: Install litellm[proxy] and prisma into the dedicated venv
  ansible.builtin.pip:
    name:
      - "litellm[proxy]=={{ litellm_version }}"
      - "prisma=={{ litellm_prisma_version }}"
    virtualenv: "{{ litellm_venv }}"
    virtualenv_command: /usr/bin/python3 -m venv
  environment:
    PRISMA_SKIP_POSTINSTALL_GENERATE: "1"
  notify: restart litellm

# --- Prisma client + schema (the native equivalent of the Docker build steps) ---
# litellm[proxy] ships only the schema; running `litellm` directly neither
# generates the Prisma client nor migrates the DB (the Docker entrypoint does both
# out of band). So we do it here, at provision time, before the daemon ever starts.

- name: Locate the litellm Prisma schema
  # The schema ships inside the litellm_proxy_extras package; ask the venv where it
  # is rather than hardcode a python3.13 site-packages path that a point release
  # could move.
  ansible.builtin.command:
    cmd: >-
      {{ litellm_venv }}/bin/python -c
      "import litellm_proxy_extras, os;
      print(os.path.join(os.path.dirname(litellm_proxy_extras.__file__), 'schema.prisma'))"
  register: litellm_schema
  changed_when: false

- name: Generate the Prisma client
  # Builds the Python client from the schema and fetches the query-engine binary
  # into the cache (over the host NAT). venv/bin on PATH lets the prisma CLI find
  # its prisma-client-py generator. No DB needed here, so no secret — left visible
  # to aid debugging. Deterministic, so it carries no useful changed signal.
  ansible.builtin.command:
    cmd: "{{ litellm_venv }}/bin/prisma generate --schema {{ litellm_schema.stdout }}"
  environment: "{{ litellm_prisma_env }}"
  changed_when: false

- name: Apply the litellm database schema (prisma migrate deploy)
  # Creates/updates litellm's tables in the (already-created) litellm DB by applying
  # the migration files litellm_proxy_extras ships. Idempotent: a converged DB
  # reports "No pending migrations to apply". DATABASE_URL carries the password, so
  # no_log; to debug a failure here, drop no_log temporarily.
  ansible.builtin.command:
    cmd: "{{ litellm_venv }}/bin/prisma migrate deploy --schema {{ litellm_schema.stdout }}"
  environment: "{{ litellm_prisma_env | combine({'DATABASE_URL': litellm_database_url}) }}"
  register: litellm_migrate
  changed_when: "'No pending migrations to apply' not in litellm_migrate.stdout"
  no_log: true
  notify: restart litellm

- name: Give the litellm user ownership of its home (venv, client, engine cache)
  # pip/generate/migrate ran as root; the daemon runs as litellm and needs to read
  # the interpreter, the `litellm` console script, the generated Prisma client and
  # the engine cache. Runs AFTER generate/migrate so all of that is covered. recurse
  # so the whole tree is consistently owned.
  ansible.builtin.file:
    path: "{{ litellm_home }}"
    state: directory
    owner: "{{ litellm_user }}"
    group: "{{ litellm_group }}"
    recurse: true

# --- Floor embedder (CPU llama-server, co-located) --------------------------
# An always-on CPU embedding server on loopback, so the cluster always has a baseline
# embedding model independent of the GPU inference nodes. A PREBUILT llama.cpp binary
# (not a source build) keeps the C++ toolchain off this lean proxy CT. litellm's
# config.yaml (rendered below) routes the embedding model_name here. The whole block
# is gated so the floor can be disabled without touching the rest of the role.

- name: Create the floor embedder directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ litellm_user }}"
    group: "{{ litellm_group }}"
    mode: "0755"
  loop:
    - "{{ llama_embed_dir }}"
    - "{{ llama_embed_bin_dir }}"
    - "{{ llama_embed_model_dir }}"
  when: litellm_embedding_enabled

- name: Download the prebuilt CPU llama.cpp release
  # Idempotent on dest; the optional checksum fails a tampered/partial download (same
  # idiom as the object_store garage binary).
  ansible.builtin.get_url:
    url: "{{ llama_embed_binary_url }}"
    dest: "{{ llama_embed_tarball }}"
    mode: "0644"
    checksum: "{{ ('sha256:' + llama_embed_binary_sha256) if llama_embed_binary_sha256 else omit }}"
  when: litellm_embedding_enabled

- name: Extract llama-server into the dist dir
  # The asset unpacks the binary + its .so libs flat under one versioned top dir;
  # --strip-components=1 drops them straight into dist/. `creates` skips re-extraction
  # once the binary exists, so converged runs are a no-op.
  ansible.builtin.unarchive:
    src: "{{ llama_embed_tarball }}"
    remote_src: true
    dest: "{{ llama_embed_bin_dir }}"
    extra_opts: ["--strip-components=1"]
    creates: "{{ llama_embed_server_bin }}"
  when: litellm_embedding_enabled

- name: Stage the nomic embedding GGUF
  # Small enough (~274 MB) to fetch at provision time over the host NAT, unlike the
  # multi-GB chat GGUFs the llama_server role stages by hand.
  ansible.builtin.get_url:
    url: "{{ llama_embed_model_url }}"
    dest: "{{ llama_embed_model_dir }}/{{ llama_embed_model_file }}"
    owner: "{{ litellm_user }}"
    group: "{{ litellm_group }}"
    mode: "0644"
    checksum: "{{ ('sha256:' + llama_embed_model_sha256) if llama_embed_model_sha256 else omit }}"
  when: litellm_embedding_enabled

- name: Install the floor embedder systemd unit
  ansible.builtin.template:
    src: llama-embed.service.j2
    dest: /etc/systemd/system/llama-embed.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart llama-embed
  when: litellm_embedding_enabled

- name: Ensure the floor embedder is started and enabled
  ansible.builtin.systemd:
    name: llama-embed
    state: started
    enabled: true
    daemon_reload: true
  when: litellm_embedding_enabled

# --- Config + secret env + unit ---------------------------------------------

- name: Deploy the litellm configuration
  # Non-secret model routing (model_list) + the master-key env reference. Group-
  # readable so the daemon reads it; secrets are NOT here, they're in the env file.
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ litellm_config_file }}"
    owner: root
    group: "{{ litellm_group }}"
    mode: "0640"
  notify: restart litellm

- name: Render the litellm secret environment file
  # DATABASE_URL (with the generated db password), LITELLM_MASTER_KEY and
  # STORE_MODEL_IN_DB. 0600 root — only systemd reads it via EnvironmentFile, before
  # it drops to the litellm user. no_log keeps the rendered secrets out of the log.
  ansible.builtin.template:
    src: litellm.env.j2
    dest: "{{ litellm_env_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart litellm

- name: Install the litellm systemd unit
  ansible.builtin.template:
    src: litellm.service.j2
    dest: /etc/systemd/system/litellm.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart litellm

- name: Ensure litellm is started and enabled
  ansible.builtin.systemd:
    name: litellm
    state: started
    enabled: true
    daemon_reload: true

# Flush now so the daemon actually comes up before we smoke-test it. By this point
# the Prisma client is generated and the schema is migrated, so startup connects to
# a ready DB instead of crashing on a missing table.
- name: Apply pending litellm restarts before the smoke test
  ansible.builtin.meta: flush_handlers

- name: Wait for the litellm proxy to accept connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ litellm_port }}"
    timeout: 90

- name: Verify the litellm health endpoint responds
  # /health/liveliness is LiteLLM's unauthenticated liveness probe — proves the app
  # booted and Prisma migrations succeeded, not merely that the port is open.
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ litellm_port }}/health/liveliness"
    status_code: 200
  register: litellm_health
  until: litellm_health is succeeded
  retries: 10
  delay: 3

# --- Scoped virtual key for Open WebUI (fixes F1: OpenWebUI must never hold
# the master/admin key) ------------------------------------------------------
# /key/generate returns a NEW key on every call, so this is guarded
# generate-once by checking the control node's secrets file first — same
# idiom as happyview_token_encryption_key in group_vars/all/main.yml. Runs
# after the health check so the daemon is confirmed live before we call its
# API. The uri module (not a shelled-out curl) keeps the master key out of
# argv — same fix class as the bootstrap.sh Issue 4 already closed.

- name: Check whether the Open WebUI virtual key already exists
  ansible.builtin.stat:
    path: "{{ _zai_secrets_dir }}/openwebui_litellm_key"
  delegate_to: localhost
  register: openwebui_key_stat

- name: Generate a scoped virtual key for Open WebUI
  # Non-admin by default (virtual keys can't call key/model-management
  # endpoints); models: [] grants full model access without admin scope.
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ litellm_port }}/key/generate"
    method: POST
    headers:
      Authorization: "Bearer {{ litellm_master_key }}"
    body_format: json
    body:
      key_alias: open-webui
      models: []
    status_code: 200
  register: openwebui_key_gen
  when: not openwebui_key_stat.stat.exists
  no_log: true

- name: Persist the Open WebUI virtual key
  ansible.builtin.copy:
    content: "{{ openwebui_key_gen.json.key }}"
    dest: "{{ _zai_secrets_dir }}/openwebui_litellm_key"
    mode: "0600"
  delegate_to: localhost
  when: not openwebui_key_stat.stat.exists
  no_log: true

# --- Admin-facing env for the zai-litellm-key operator CLI ------------------
# Mirrors the backup role's /etc/zai-backup/restic.env: the role renders only
# the secret/host-specific bits an in-git script (bin/zai-litellm-key) can't
# carry. Unlike the secrets above this isn't generate-once state — it's just
# the current master key + address, safe to re-render every run.

- name: Ensure the zai-litellm-key admin config directory exists
  ansible.builtin.file:
    path: /etc/zai-litellm
    state: directory
    owner: root
    group: root
    mode: "0700"
  delegate_to: localhost

- name: Render the zai-litellm-key admin env file
  ansible.builtin.copy:
    content: |
      LITELLM_API_BASE=http://{{ hostvars['litellm'].ansible_host }}:{{ litellm_port }}
      LITELLM_MASTER_KEY={{ litellm_master_key }}
    dest: /etc/zai-litellm/admin.env
    owner: root
    group: root
    mode: "0600"
  delegate_to: localhost
  no_log: true

# --- Floor embedder smoke test ----------------------------------------------
# Runs after the flush above, so a changed llama-embed unit is already restarted.
# Loading the GGUF on CPU takes a few seconds, hence the wait + retries.

- name: Wait for the floor embedder to accept connections
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ litellm_embedding_port }}"
    timeout: 90
  when: litellm_embedding_enabled

- name: Verify the floor embedder returns an embedding
  # Proves the server booted in embeddings mode and the model loaded — not merely that
  # the port is open. This is the path OpenWebUI will use (via litellm) once built.
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ litellm_embedding_port }}/v1/embeddings"
    method: POST
    body_format: json
    body:
      model: "{{ litellm_embedding_model_name }}"
      input: "search_document: ping"
    status_code: 200
  register: llama_embed_health
  until: llama_embed_health is succeeded
  retries: 10
  delay: 3
  when: litellm_embedding_enabled
