---
# Install Nginx Proxy Manager (NPM) natively — no Docker (CLAUDE.md pinned).
# NPM has no apt package, so we add the OpenResty repo (Node comes from Debian),
# then run a version-aware build script that reproduces NPM's dockerless assembly.
# The build lives in npm-build.sh (like object_store's garage-init.sh) because
# it's an inherently shell-shaped, vendored multi-step build; Ansible owns
# everything around it (repos, dirs, config, unit, services).
#
# Order matters: configure the OpenResty repo BEFORE any apt cache update. The
# repo file is (re)written here too, so a re-run after a failed attempt that left
# a stale (trixie) openresty.sources self-heals — the bookworm suite lands before
# the first `apt update` instead of wedging on it.

- name: Ensure the apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

# OpenResty's repo is signed by an ASCII-armored key; apt reads .asc files via
# signed-by directly, so no dearmor step is needed. (Node comes from Debian's own
# repo — trixie ships nodejs 20.19.x, which is new enough to build NPM's frontend
# (vite 8 needs >= 20.19) and run its backend, so we don't add NodeSource.)
- name: Install the OpenResty signing key
  ansible.builtin.get_url:
    url: https://openresty.org/package/pubkey.gpg
    dest: /etc/apt/keyrings/openresty.asc
    mode: "0644"

# OpenResty publishes per Debian codename but has no trixie repo yet, so pin
# npm_openresty_suite (bookworm). It installs cleanly on trixie because OpenResty
# bundles its own PCRE/OpenSSL — see the var comment in defaults/main.yml.
- name: Add the OpenResty apt repository
  ansible.builtin.deb822_repository:
    name: openresty
    types: deb
    uris: "http://openresty.org/package/debian"
    suites: "{{ npm_openresty_suite }}"
    components: openresty
    signed_by: /etc/apt/keyrings/openresty.asc

# Debian 13's apt verifies repo signatures with Sequoia (`sqv`), whose policy
# rejects SHA1 key self-signatures from 2026-02-01. OpenResty's signing key is
# SHA1-bound, so sqv reports the (correctly signed) repo as "not signed" and the
# apt update wedges. Point apt at the classic GnuPG verifier (`gpgv`) instead:
# it still verifies the signature against the pinned key, but accepts SHA1
# self-sigs, so authenticity is preserved without disabling verification. This
# applies to every repo on the CT; that's fine — gpgv verifies the others too.
- name: Use gpgv (not Sequoia sqv) for apt signature verification
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/99-zai-gpgv
    mode: "0644"
    content: |
      // Managed by Ansible (nginx-proxy-manager role). See tasks/main.yml.
      APT::Key::gpgvcommand "gpgv";

# Single apt update, now that the OpenResty repo is in place. Base build/runtime
# deps, Node.js + npm (Debian's — npm is a separate package from nodejs here), and
# OpenResty land together. node-gyp needs build-essential + python3 for the native
# modules NPM's install compiles (e.g. @parcel/watcher).
- name: Install base deps, Node.js and OpenResty
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - gnupg
      - git
      - build-essential
      - python3
      - sqlite3
      - logrotate
      - rsync
      - nodejs
      - npm
      - openresty
    state: present
    update_cache: true

- name: Install yarn (NPM's package manager) at the pinned version
  ansible.builtin.command: "npm install -g yarn@{{ npm_yarn_version }}"
  args:
    creates: "/usr/lib/node_modules/yarn/package.json"

- name: Create the source/scratch directory
  ansible.builtin.file:
    path: "{{ npm_src_dir }}"
    state: directory
    mode: "0755"

# /data is the runtime state — the SQLite DB, per-host nginx config and any
# uploaded certs. It's what the backup role's Tier-2 wiring captures.
- name: Create the NPM data tree
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ npm_data_dir }}"
    - "{{ npm_data_dir }}/nginx"
    - "{{ npm_data_dir }}/nginx/proxy_host"
    - "{{ npm_data_dir }}/custom_ssl"
    - "{{ npm_data_dir }}/logs"
    - "{{ npm_data_dir }}/access"
    - "{{ npm_app_dir }}/config"
    - /var/www/html
    - /tmp/nginx/body
    - /var/cache/nginx/proxy_temp

- name: Render the backend database config (SQLite at {{ npm_data_dir }})
  ansible.builtin.template:
    src: production.json.j2
    dest: "{{ npm_app_dir }}/config/production.json"
    mode: "0644"
  notify: restart npm

- name: Install the NPM build script
  ansible.builtin.template:
    src: npm-build.sh.j2
    dest: /usr/local/bin/npm-build.sh
    mode: "0700"

# Version-aware: the script no-ops when the installed marker already matches
# npm_version, so a re-run is a no-op and a deliberate bump triggers a rebuild.
- name: Build and stage NPM v{{ npm_version }}
  ansible.builtin.command: /usr/local/bin/npm-build.sh
  register: npm_build
  changed_when: "'already installed' not in npm_build.stdout"
  notify: restart npm

- name: Install the npm systemd unit
  ansible.builtin.template:
    src: npm.service.j2
    dest: /etc/systemd/system/npm.service
    mode: "0644"
  notify:
    - reload systemd
    - restart npm

- name: Install the NPM log rotation policy
  ansible.builtin.template:
    src: npm.logrotate.j2
    dest: /etc/logrotate.d/npm
    mode: "0644"

# Flush so the unit/build are live before we validate and assert reachability.
- name: Apply pending restarts before validation
  ansible.builtin.meta: flush_handlers

- name: Ensure OpenResty and NPM are started and enabled
  ansible.builtin.service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - openresty
    - npm

- name: Validate the assembled OpenResty configuration
  ansible.builtin.command: /usr/sbin/nginx -t
  changed_when: false
