---
# Configure the bare-metal inference nodes: install the NVIDIA driver + CUDA,
# then build llama.cpp and install the llama-server systemd unit. Run from inside
# CT 100 after a node has been enrolled (see enroll-inference-node.yml):
#
#   ansible-playbook inference.yml --limit salmon
#
# The hosts come from the git-ignored runtime inventory (inventory/local.yml);
# the committed inventory only declares an empty inference_nodes group, so a
# no-`--limit` run is safe on a fresh checkout (it simply matches nothing).
#
# Reached over SSH as the `ansible` user using CT 100's root ed25519 key (the
# same key generated by the control_node role). NODE PREP IS A PREREQUISITE on
# each node: Secure Boot disabled in BIOS, an `ansible` user with NOPASSWD sudo,
# and CT 100's root public key in that user's authorized_keys. See
# docs/roles/nvidia_cuda.md.

- name: Configure inference nodes
  hosts: inference_nodes
  remote_user: ansible
  become: true
  roles:
    - nvidia_cuda
    - llama_server
