---
# Install and configure nginx as the ZAI reverse proxy.

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true

# Debian ships a default vhost that also claims `listen 80 default_server`,
# which would collide with our own default server. Remove its symlink.
- name: Disable the stock default site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Deploy the reverse-proxy vhost
  ansible.builtin.template:
    src: reverse-proxy.conf.j2
    dest: /etc/nginx/sites-available/zai-reverse-proxy.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Enable the reverse-proxy vhost
  ansible.builtin.file:
    src: /etc/nginx/sites-available/zai-reverse-proxy.conf
    dest: /etc/nginx/sites-enabled/zai-reverse-proxy.conf
    state: link
  notify: reload nginx

# Validate the full assembled config now, so a bad template fails the run
# immediately rather than at the deferred reload handler.
- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  changed_when: false

- name: Ensure nginx is started and enabled
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
