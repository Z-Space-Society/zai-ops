---
# Schedule a recurring backup of the control node's runtime state to the cluster
# object store. The backup logic is /opt/zai-ops/bin/zai-backup (in git, on
# PATH) — this role only installs restic, renders the secret env, and wires up
# the systemd timer. Nothing is copied out of the repo, so a `git pull` makes
# script/config changes live without re-running this play.

- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present
    update_cache: true

- name: Create the backup config directory
  ansible.builtin.file:
    path: /etc/zai-backup
    state: directory
    owner: root
    group: root
    mode: "0700"

# Holds the repo URL + password, S3 credentials, and the postgres CT's IP — the
# secret/host-specific values the in-git script can't carry. Root-only; the
# script sources it.
- name: Render the restic environment file
  ansible.builtin.template:
    src: restic.env.j2
    dest: /etc/zai-backup/restic.env
    owner: root
    group: root
    mode: "0600"

# Symlink (not copy) the systemd units from the repo so editing them in git and
# pulling makes the change live after a daemon-reload — no re-render. ExecStart
# already points at /opt/zai-ops/bin/zai-backup, so behaviour changes need
# neither this play nor a reload, just a pull.
- name: Symlink the backup systemd units into place
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item }}"
    dest: "/etc/systemd/system/{{ item }}"
    state: link
    force: true
  loop:
    - zai-backup.service
    - zai-backup.timer
  notify: reload systemd

- name: Enable the backup timer
  ansible.builtin.systemd:
    name: zai-backup.timer
    state: started
    enabled: true
    daemon_reload: true

# Run once now so a misconfiguration (unreachable object store, bad creds,
# uninitialised repo) fails the play instead of silently waiting for 03:00.
- name: Run an initial backup
  ansible.builtin.command:
    cmd: /opt/zai-ops/bin/zai-backup run
  register: backup_initial
  changed_when: true
  when: backup_run_now | bool
