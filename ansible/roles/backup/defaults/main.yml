---
# Control-node backup, via restic, to the cluster object store.
#
# This role only holds the values needed to render the secret env file and run
# the timer. The backup *behaviour* — what paths to capture, retention, the
# postgres toggle, the schedule — lives in git, not here:
#   - paths / retention / postgres on-off → /opt/zai-ops/bin/zai-backup (config block)
#   - schedule (OnCalendar)               → roles/backup/files/zai-backup.timer
# Edit those and `git pull`; no need to re-run this play (the timer schedule also
# needs `systemctl daemon-reload`). See docs/roles/backup.md.

# restic repository = the Garage S3 endpoint on the object-store CT. The IP is
# read from inventory (not duplicated here) so it tracks a hosts.yml change.
backup_s3_endpoint: "http://{{ hostvars['object-store'].ansible_host }}:3900"
backup_s3_bucket: "zai-backups"
backup_s3_region: "garage"
backup_repository: "s3:{{ backup_s3_endpoint }}/{{ backup_s3_bucket }}"

# Run a backup immediately at the end of the play (validates the whole path
# end-to-end). Turn off for a config-only apply.
backup_run_now: true

# restic_repo_password + object_store_access_key/secret_key are auto-generated in
# group_vars/all/main.yml (same values Garage imported) — no manual step. They
# and ZAI_POSTGRES_HOST are rendered into /etc/zai-backup/restic.env (0600).
#
# NOTE for disaster recovery: the restic repo is encrypted with
# restic_repo_password, which lives in /root/.zai-secrets *and* inside the repo
# itself. To restore after losing CT 100 you need that password out-of-band —
# escrow /root/.zai-secrets off-box, the same way the vault password is backed up
# at bootstrap. (On-box CT-level restore just needs the dir put back first.)
