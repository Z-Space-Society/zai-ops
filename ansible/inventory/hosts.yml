---
# ZAI cluster inventory.
#
# The control node (CT 100) configures itself over a local connection, then
# uses the Proxmox API to create and configure the service containers below.
all:
  children:
    control_node:
      hosts:
        ct100:
          ansible_connection: local

    # Service containers — created by Ansible via the Proxmox API (provision.yml).
    # Each host carries its own create specs (cores/memory/disk) and netif, so
    # the create play is fully data-driven. ansible_host is the static internal
    # IP on vmbr1, reachable from CT 100's vmbr1 NIC.
    #
    # nginx (101) is the only LAN-facing CT: net0 on vmbr0/DHCP plus net1 on the
    # internal bridge. The rest (102-104) will be vmbr1-only with gw=10.1.1.1
    # (the host NAT) — specs filled in as each comes online.
    services:
      hosts:
        ct101-nginx:
          ctid: 101
          ansible_host: 10.1.1.101
          ansible_user: root
          ct_hostname: ct101-nginx
          ct_cores: 1
          ct_memory: 512        # MB — generous for a reverse proxy
          ct_swap: 512
          ct_disk: 8            # GB rootfs on local-lvm
          ct_netif:
            net0: "name=eth0,bridge=vmbr0,ip=dhcp"
            net1: "name=eth1,bridge=vmbr1,ip=10.1.1.101/24"
        ct102-postgres:
          ctid: 102
        ct103-litellm:
          ctid: 103
        ct104-open-webui:
          ctid: 104

    # Bare-metal inference nodes (salmon, orca, …) running llama-server on NVIDIA
    # GPUs. Declared empty on purpose: the real hosts are this-cluster specifics,
    # so they live in the git-ignored runtime inventory (inventory/local.yml),
    # written by `enroll-inference-node.yml`. The empty group keeps a fresh
    # checkout self-documenting and lets `inference.yml` match without warning.
    inference_nodes:
      hosts: {}
