---
# Read-only check that the Proxmox API token minted by the host bootstrap
# actually authenticates from the control node. Run after site.yml:
#
#   ansible-playbook verify-proxmox.yml
#
# Green (failed=0, nodes listed) means the whole chain works: pveum mint ->
# encrypted vault -> /root/.vault_pass -> API auth. This is deliberately
# separate from the CT-creation play: info calls accept token auth, whereas
# LXC *creation* has known root@pam-only pre-checks to validate later.
#
# Uses community.proxmox (the proxmox modules moved here from community.general,
# which deprecated its copies). Requires the python3-proxmoxer library on the
# control node — installed by the control_node role.

- name: Verify Proxmox API access from the control node
  hosts: control_node
  gather_facts: false
  tasks:
    - name: Query Proxmox nodes via the API token
      community.proxmox.proxmox_node_info:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_token_id: "{{ proxmox_api_token_id }}"
        api_token_secret: "{{ proxmox_api_token_secret }}"
      register: pve_nodes

    - name: Show reachable nodes
      ansible.builtin.debug:
        var: pve_nodes.proxmox_nodes
