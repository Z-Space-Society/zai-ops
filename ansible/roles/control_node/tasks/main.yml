---
# Control-node (CT 100) base configuration.
#
# The locale is first fixed in bootstrap (before Ansible can even start; see
# bootstrap/bootstrap.sh), along with LANG in /etc/environment and the repo
# checkout. We re-assert the locale here, BEFORE the upgrade, so a
# glibc/locales upgrade regenerates locale-archive with en_US.UTF-8 present
# instead of wiping it.

- name: Ensure the en_US.UTF-8 locale is generated
  community.general.locale_gen:
    name: en_US.UTF-8
    state: present

- name: Update apt cache and run a full upgrade
  ansible.builtin.apt:
    update_cache: true
    upgrade: full

# The community.proxmox modules talk to the Proxmox API through proxmoxer.
- name: Install the Proxmox API client library
  ansible.builtin.apt:
    name:
      - python3-proxmoxer
      - python3-requests
    state: present

# Service CTs are created with this public key injected into their root
# authorized_keys (the proxmox module's `pubkey`), so Ansible can SSH in over
# the internal network afterward. Idempotent: only generates if absent.
- name: Ensure root has an ed25519 SSH keypair to inject into service CTs
  ansible.builtin.user:
    name: root
    generate_ssh_key: true
    ssh_key_type: ed25519
    ssh_key_file: .ssh/id_ed25519

# The vault password sits beside the vault on CT 100 by design (host root is the
# trust boundary). Defense-in-depth: assert it stays root-only so permission
# drift gets caught. The bootstrap writes it with umask 077 already.
- name: Assert the vault password file is root-only
  ansible.builtin.file:
    path: /root/.vault_pass
    mode: "0600"
    owner: root
    group: root
