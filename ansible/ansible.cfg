[defaults]
inventory = inventory/hosts.yml
roles_path = roles
retry_files_enabled = False
# YAML-formatted task results via the builtin default callback (the old
# community.general.yaml stdout callback is deprecated).
callback_result_format = yaml
# Pin the interpreter; targets are Debian 13 where /usr/bin/python3 is correct.
interpreter_python = /usr/bin/python3
# Auto-decrypt the vault. The host bootstrap writes this file on CT 100.
vault_password_file = /root/.vault_pass

[ssh_connection]
# Trust-on-first-use instead of no-trust-ever: record a freshly-created CT's
# host key on first contact, then enforce it. Catches the common attack/accident
# (key change after first contact) that host_key_checking=False ignored entirely.
ssh_args = -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/root/.ssh/known_hosts
