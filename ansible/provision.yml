---
# Create the service containers over the Proxmox API, then configure them.
# Run from inside the control node after site.yml (which generates the SSH key
# injected below). A service must be assigned a CTID first; then drive it by its
# logical name:
#
#   zai-assign proxy 110                  # record proxy → CTID 110 (10.1.1.110)
#   ansible-playbook provision.yml --limit proxy
#
# The CTID comes from the runtime assignment (inventory/local.yml); this play
# parses no number out of a host name. The create play runs ON the control node
# (connection: local) and talks to the Proxmox API with the same vault token
# verify-proxmox.yml uses — token auth is sufficient for a plain managed-storage
# LXC create (no bind mounts). The `when: ct_netif is defined` guard skips any
# service host that hasn't had its create specs filled in yet, so a no-limit run
# is safe.

- name: Create service containers via the Proxmox API
  hosts: service_containers
  connection: local
  gather_facts: false
  module_defaults:
    community.proxmox.proxmox:
      api_host: "{{ proxmox_api_host }}"
      api_user: "{{ proxmox_api_user }}"
      api_token_id: "{{ proxmox_api_token_id }}"
      api_token_secret: "{{ proxmox_api_token_secret }}"
      node: "{{ proxmox_node_name }}"
      # api_timeout is the proxmoxer HTTPS *read* timeout; community.proxmox
      # defaults it to 5s, which the LXC-create POST blows past on a fresh node
      # ("Read timed out. (read timeout=5)"). Needs the collection pinned in
      # requirements.yml (>=1.6.0) — the distro's bundled 1.3.0 has no such knob
      # and will reject this param, which is the intended loud failure if the
      # control node wasn't configured by site.yml first. `timeout` is separate:
      # it bounds how long the module waits for the create/start task to finish.
      api_timeout: 120
      timeout: 120
      # Proxmox serves a self-signed cert on 8006, so cert validation must stay
      # off. community.proxmox <2.0.0 defaults validate_certs to false (with a
      # deprecation warning); 2.0.0 flips the default to true, which would fail
      # every API call here — so pin it explicitly rather than rely on the default.
      validate_certs: false
  tasks:
    - name: Fail fast if the Proxmox node name is unrecorded
      # proxmox_node_name is runtime data in inventory/local.yml (bootstrap.sh
      # records it from the host's hostname; zai-set-node sets it). If it's
      # missing — e.g. a control node that predates the runtime-node change —
      # every API call below would target an undefined node. Refuse early with an
      # actionable message instead of a cryptic undefined-variable error or, worse,
      # a phantom-node HTTP 595 at create time.
      ansible.builtin.assert:
        that: proxmox_node_name is defined
        fail_msg: >-
          proxmox_node_name is not recorded — run: zai-set-node <node>
          (or re-run bootstrap.sh, which records it automatically).
      run_once: true

    - name: Fail fast if the service has no CTID assignment
      # ctid is supplied only by the runtime assignment (inventory/local.yml).
      # Without it ansible_host and the netif IP can't resolve, so refuse early
      # with an actionable message instead of inventing a number. Gated on
      # ct_netif so unspecced placeholder services (no create specs) stay skipped.
      ansible.builtin.assert:
        that: ctid is defined
        fail_msg: >-
          {{ inventory_hostname }} has no CTID —
          run: zai-assign {{ inventory_hostname }} <ctid>
      when: ct_netif is defined

    - name: Create the LXC container
      # disk MUST be the `<storage>:<size>` string form (e.g. local-lvm:8), NOT a
      # bare size with a separate `storage:` — the latter renders a pathless
      # rootfs that PVE rejects under token auth ("Only root can pass arbitrary
      # filesystem paths"). ostemplate is set explicitly; a wrong value there
      # surfaces as a misleading bare 'errors', not an auth failure.
      community.proxmox.proxmox:
        vmid: "{{ ctid }}"
        hostname: "{{ ct_hostname }}"
        ostemplate: "local:vztmpl/debian-13-standard_13.1-2_amd64.tar.zst"
        disk: "{{ ct_rootfs_storage }}:{{ ct_disk }}"
        cores: "{{ ct_cores }}"
        memory: "{{ ct_memory }}"
        swap: "{{ ct_swap }}"
        unprivileged: true
        onboot: true
        features:
          - nesting=1
        pubkey: "{{ lookup('file', '/root/.ssh/id_ed25519.pub') }}"
        netif: "{{ ct_netif }}"
        state: present
      when: ct_netif is defined

    - name: Start the container
      # hostname is the load-bearing fix: without it the module's power-state
      # path evaluates `hostname or lxc["name"]` and KeyErrors ('name') on a
      # freshly created CT whose cluster record hasn't populated 'name' yet
      # (community.proxmox issue #98). retries cover the same post-create race.
      community.proxmox.proxmox:
        vmid: "{{ ctid }}"
        hostname: "{{ ct_hostname }}"
        state: started
      register: ct_start
      until: ct_start is succeeded
      retries: 5
      delay: 3
      when: ct_netif is defined

    - name: Wait for SSH on the internal IP
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 120
      when: ct_netif is defined

- name: Configure the reverse-proxy edge
  hosts: proxy
  gather_facts: true
  roles:
    - proxy

- name: Configure the object store
  hosts: object-store
  gather_facts: true
  roles:
    - object_store

- name: Configure the Postgres database server
  hosts: postgres
  gather_facts: true
  roles:
    - postgres

# zai-auth runs AFTER postgres: its role creates the zai_auth role + database ON
# the postgres CT (delegate_to: postgres), and syncs the app source from this
# repo's own checkout on the control node (no published package to install). A
# --limit zai-auth run still needs postgres already provisioned.
- name: Configure ZAI Auth (ATProto -> OIDC login bridge)
  hosts: zai-auth
  gather_facts: true
  roles:
    - zai-auth

# litellm runs AFTER postgres: its role creates the litellm role + database ON the
# postgres CT (delegate_to: postgres) and the server must already be up with
# scram-sha-256 in effect so the role password hashes correctly. A full
# provision.yml run satisfies this ordering; a --limit litellm run still needs
# postgres already provisioned (its host facts + SSH reachability are required for
# the delegated tasks).
- name: Configure the LiteLLM proxy
  hosts: litellm
  gather_facts: true
  roles:
    - litellm

# open-webui runs AFTER postgres (its role creates the openwebui role + database ON
# the postgres CT, delegate_to: postgres) and conceptually after litellm (it talks to
# the litellm CT as its OpenAI-compatible chat + embedding backend). A full
# provision.yml run satisfies this; a --limit open-webui run still needs postgres
# provisioned (its host facts + SSH reachability are required for the delegated DB
# tasks) and litellm reachable for chat/embeddings to work at runtime.
- name: Configure Open WebUI
  hosts: open-webui
  gather_facts: true
  roles:
    - open-webui

# happyview runs AFTER postgres: its role creates the happyview role + database ON
# the postgres CT (delegate_to: postgres). A --limit happyview run still needs
# postgres already provisioned (its host facts + SSH reachability are required for
# the delegated DB tasks). Note: first run takes ~15–30 min on a cold CT because
# cargo build --release downloads and compiles the full Rust dependency graph.
- name: Configure HappyView
  hosts: happyview
  gather_facts: true
  roles:
    - happyview
