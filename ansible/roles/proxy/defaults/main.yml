---
# Caddy — the cluster's reverse-proxy edge. Routes are declarative and committed
# here (caddy_proxy_hosts), not held in a UI/SQLite DB, so the CT holds no
# unreproducible state (config in git, cert in the vault).

# Where the Cloudflare Origin CA cert/key land on the CT. The material itself is
# a secret and comes from the vault (cloudflare_origin_cert/_key); these are just
# the install paths the Caddyfile points its `tls` directive at.
caddy_cert_path: /etc/caddy/cloudflare-origin.pem
caddy_key_path: /etc/caddy/cloudflare-origin.key

# Origin TLS auto-enables once the Cloudflare Origin CA cert is in the vault. Until
# then the role stands Caddy up HTTP-only (proxying on :80) so the CT can be brought
# up and smoke-tested before the cert exists — add cloudflare_origin_cert/_key to
# the vault and re-run to flip on :443 + the :80→:443 redirect. Override to force.
caddy_tls_enabled: "{{ cloudflare_origin_cert is defined }}"

# Data-driven proxy routes — the reproducibility win. Each entry maps a
# public domain to an internal service; the upstream IP is DERIVED from that
# service's CTID via hostvars (10.1.1.<ctid>), never hardcoded — same convention
# the inventory uses. The domain derives from cluster_domain (set per cluster with
# `zai-set-domain`), so the committed route carries no this-cluster facts either.
# The :80 health/redirect site keeps the Caddyfile valid even with no routes.
#
# Optional `redirects: [{ from, to, code, skip_if_cookie }]` per entry —
# edge-level 302s (Caddy `handle <from> { redir <to> <code> }`, evaluated
# before the catch-all reverse_proxy) for cases the upstream app can't do
# itself. open-webui's is the motivating case: it has no native "skip
# straight to the only OAuth provider" option (open-webui/open-webui#24325),
# so /auth* is redirected straight to the OIDC login route instead of
# showing an intermediate page.
#
# `skip_if_cookie: token` is load-bearing, not optional polish: open-webui's
# OIDC callback always finishes by redirecting the browser BACK to this same
# /auth path (its frontend reads the just-set `token` session cookie there
# and completes login client-side) — a blind /auth* redirect also catches
# that completion request and bounces it into a fresh OIDC round-trip
# forever (the app-side log shows a successful token exchange on every
# cycle, the browser just never lands). Only shortcut to the provider when
# that cookie is genuinely absent (a first-time visitor); let a request that
# already carries it fall through to the real app instead.
caddy_proxy_hosts:
  - { domain: "api.{{ cluster_domain }}", service: litellm, port: 4000 }
  - domain: "chat.{{ cluster_domain }}"
    service: open-webui
    port: 8080
    redirects:
      - from: "/auth*"
        to: "/oauth/oidc/login"
        code: 302
        skip_if_cookie: token
  - { domain: "view.{{ cluster_domain }}", service: happyview, port: 3000 }
  - { domain: "account.{{ cluster_domain }}", service: zai-auth, port: 8000 }
