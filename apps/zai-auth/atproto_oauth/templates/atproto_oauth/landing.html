{% extends "base.html" %}

{% block title %}Account — ZAI{% endblock %}

{% block content %}
<div class="account-view">
  <h1>Account</h1>

  <div class="account-card">
    <div class="avatar"></div>
    <div>
      <div class="account-meta__handle">{{ user.username }}</div>
      <div class="account-meta__did">{{ user.did }}</div>
    </div>
  </div>

  <a class="btn-outline-danger" href="{% url 'atproto_oauth:logout' %}">Sign out</a>
</div>
{% endblock %}
