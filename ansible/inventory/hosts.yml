---
# ZAI cluster inventory — the committed BLUEPRINT.
#
# This file carries NO container numbers. It declares which services exist, what
# role each runs, and how big each CT is — all keyed by a generic logical name
# (npm, postgres, …), never a CTID. The actual CTID each service got is runtime,
# per-cluster data written to the git-ignored inventory/local.yml by the assign
# action (`zai-assign <service> <ctid>`), which Ansible merges in because the
# inventory is loaded as a directory. So a service's number is data, not identity:
# the same blueprint stands up a cluster on whatever CTIDs are free.
#
# IP is DERIVED, never stored: group_vars/service_containers.yml sets
# ansible_host = 10.1.1.{{ ctid }}, so CTID 104 ⇒ 10.1.1.104 by construction, with
# no second field to drift. Per-host netif strings template the same {{ ctid }}.
all:
  children:
    control_node:
      hosts:
        # The control node configures itself over a local connection. Its CTID
        # varies per host (100 on a clean box, 199 on a brownfield one) and its
        # internal IP is pinned to 10.1.1.100 by bootstrap.sh regardless — so it
        # sits OUTSIDE the 10.1.1.{ctid} convention and carries no ctid here.
        control:
          ansible_connection: local

    # Service containers — created by Ansible via the Proxmox API (provision.yml)
    # once a CTID has been assigned. Each host carries its create specs
    # (cores/memory/disk) and a netif blueprint; the create play reads `ctid` from
    # the runtime assignment. The `when: ct_netif is defined` guard in
    # provision.yml skips any service whose specs aren't filled in yet, so a
    # no-limit run is safe.
    #
    # npm (Nginx Proxy Manager) is the LAN-facing CT: net0 on vmbr0/DHCP plus
    # net1 on the internal bridge. caddy is a trial second reverse proxy, also
    # dual-homed. The rest are vmbr1-only with gw=10.1.1.1 (host NAT).
    service_containers:
      hosts:
        npm:
          ansible_user: root
          ct_cores: 2           # the native yarn frontend build wants >1 core
          ct_memory: 2048       # MB — headroom for the build (matches the NPM community LXC)
          ct_swap: 512
          ct_disk: 8            # GB rootfs on local-lvm — npm-build.sh cleans its scratch
          ct_netif:
            net0: "name=eth0,bridge=vmbr0,ip=dhcp"
            net1: "name=eth1,bridge=vmbr1,ip=10.1.1.{{ ctid }}/24"

        # Caddy — a TRIAL second reverse proxy, standing beside npm for an
        # in-place comparison (npm stays untouched). Single Go binary, so it's
        # tiny next to npm's source build. Dual-homed like npm so the trial is
        # reachable from the LAN; its routes live in git (the caddy role's
        # caddy_proxy_hosts), not a UI DB.
        caddy:
          ansible_user: root
          ct_cores: 1
          ct_memory: 512        # MB — a single Go binary; no build to feed
          ct_swap: 512
          ct_disk: 4            # GB rootfs on local-lvm
          ct_netif:
            net0: "name=eth0,bridge=vmbr0,ip=dhcp"
            net1: "name=eth1,bridge=vmbr1,ip=10.1.1.{{ ctid }}/24"

        # Postgres — internal-only database server backing the other services
        # (litellm, open-webui). vmbr1-only with gw=10.1.1.1 (host NAT), like the
        # object store. Roomier than the proxies for the data directory.
        postgres:
          ansible_user: root
          ct_cores: 2
          ct_memory: 2048       # MB — comfortable for metadata DBs (litellm/open-webui)
          ct_swap: 512
          ct_disk: 16           # GB rootfs on local-lvm
          ct_netif:
            net0: "name=eth0,bridge=vmbr1,ip=10.1.1.{{ ctid }}/24,gw=10.1.1.1"

        # Internal-only services — specs filled in as each comes online. With no
        # ct_netif yet they are blueprint placeholders that provision.yml skips.
        litellm:
        open-webui:

        # Object store (Garage) — the on-box backup target. Internal-only; the
        # backup job on the control node reaches it over vmbr1. Roomier rootfs than
        # the other service CTs because it holds the restic repo (deduplicated, but
        # grows once Tier-2 service-data backups land). Same physical disk as the
        # rest by design: this guards CT-level loss, not whole-host loss — an
        # off-site restic target is the follow-up (see docs/roles/backup.md).
        object-store:
          ansible_user: root
          ct_cores: 1
          ct_memory: 1024       # MB — comfortable for a single-node Garage
          ct_swap: 512
          ct_disk: 32           # GB rootfs on local-lvm — holds the restic repo
          ct_netif:
            net0: "name=eth0,bridge=vmbr1,ip=10.1.1.{{ ctid }}/24,gw=10.1.1.1"

    # Bare-metal inference nodes (salmon, orca, …) running llama-server on NVIDIA
    # GPUs. Declared empty on purpose: the real hosts are this-cluster specifics,
    # so they live in the git-ignored runtime inventory (inventory/local.yml),
    # written by `enroll-inference-node.yml`. The empty group keeps a fresh
    # checkout self-documenting and lets `inference.yml` match without warning.
    inference_nodes:
      hosts: {}
