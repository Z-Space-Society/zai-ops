---
# Non-secret cluster-wide vars (the encrypted secrets live in vault.yml beside
# this file). These are committed BLUEPRINT defaults — generic, no this-cluster
# identity.
#
# proxmox_node_name is deliberately NOT here: it's the host you flashed, not
# committed identity — the same category as the CTID assignments and the domain
# (ADR-0001). bootstrap.sh records it from `hostname` into the git-ignored runtime
# inventory (inventory/local.yml); set it by hand with `zai-set-node <node>`.
# Provision targets it as the `node:` of every API call; a stale value makes
# pveproxy proxy every create to a phantom node and time out (HTTP 595).

# cluster_domain — the cluster's public base domain (e.g. zai.cascadia.design),
# consumed by Caddy proxy routes like api.{{ cluster_domain }}. Deliberately NOT
# set here: like the service CTIDs, it's per-cluster runtime data, not committed
# identity. Set it with `zai-set-domain <domain>`, which records it in the
# git-ignored runtime inventory (inventory/local.yml) under `all: vars:`. Leaving
# it out of the committed tree keeps the blueprint generic (ADR-0001).

# CTIDs the assign action (ansible/assign.yml) refuses to hand out — the safety
# rail against stomping live or externally-managed containers. Default is just
# the control node's pinned target (100). On a BROWNFIELD host, widen this to
# every live CTID before assigning anything, e.g. on yvette:
#   reserved_ctids: [100, 101, 102, 103, 104, 199]
# (100 = eventual control-node target, 101-104 = live services, 199 = the current
# control node). With these set, no assign or provision run can target them.
reserved_ctids: [100]

# Storage for service-CT root filesystems. Combined with each CT's ct_disk size
# into the `disk: <storage>:<size>` form the proxmox module needs — a bare size
# with a separate `storage:` renders a pathless rootfs that PVE rejects under
# token auth ("Only root can pass arbitrary filesystem paths").
ct_rootfs_storage: local-lvm

# --- Auto-generated runtime secrets (no manual step) -----------------------
# Generated on the control node the first time they're used and persisted under
# /root/.zai-secrets (root-only); re-runs reuse the same values, so the
# object-store key and restic repo stay stable. The expressions below are
# *recipes*, not secrets — the material lives only on CT 100 — so they belong
# here, not in the vault. Same posture as /root/.vault_pass: host root is the
# trust boundary.
#
# The `password` lookup runs on the control node regardless of a play's target,
# so the object_store play (CT 105) and the backup play (CT 100) both resolve to
# the *same* values. `chars=digits,abcdef` gives lowercase hex.
#
# These are part of the control node's restored state: a fresh CT 100 would
# generate *new* values, so restore /root/.zai-secrets (it's in the backup)
# before re-running Ansible. See docs/roles/backup.md.
_zai_secrets_dir: /root/.zai-secrets
garage_rpc_secret: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/garage_rpc_secret chars=digits,abcdef length=64') }}"
garage_admin_token: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/garage_admin_token chars=digits,abcdef length=64') }}"
object_store_access_key: "GK{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/object_store_access_key chars=digits,abcdef length=24') }}"
object_store_secret_key: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/object_store_secret_key chars=digits,abcdef length=64') }}"
restic_repo_password: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/restic_repo_password chars=digits,abcdef length=64') }}"

# LiteLLM proxy secrets. master_key is the proxy's admin/root API key (the `sk-…`
# clients and the admin UI authenticate with); db_password is the password for the
# `litellm` Postgres role the litellm role creates on the postgres CT. Both resolve
# on the control node, so the litellm play (which renders the env file) and the
# role-provisioning task (which sets the PG password) see identical values, and
# they stay stable across rebuilds. Hex chars keep them clear of any character that
# would need percent-encoding inside the DATABASE_URL.
litellm_master_key: "sk-{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/litellm_master_key chars=digits,abcdef length=48') }}"
litellm_db_password: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/litellm_db_password chars=digits,abcdef length=48') }}"

# salt_key encrypts every provider credential STORE_MODEL_IN_DB writes to Postgres.
# DISTINCT from master_key on purpose: LiteLLM falls back to the master key when this
# is unset, which couples credential encryption to a key that is otherwise rotatable
# — and the salt key CANNOT be changed once a model is stored (no recovery short of
# dropping the encrypted rows). A dedicated, stable salt key keeps the two concerns
# independent. Generated and pinned like master_key so it never silently changes.
litellm_salt_key: "sk-{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/litellm_salt_key chars=digits,abcdef length=48') }}"

# OpenWebUI secrets, same posture/pattern as the litellm pair above (resolved on the
# control node, persisted under /root/.zai-secrets, stable across rebuilds). db_password
# is the password for the `openwebui` Postgres role the open-webui role creates on the
# postgres CT; secret_key signs OpenWebUI's session JWTs — set explicitly so logins
# survive a rebuild (unset, OpenWebUI writes a random one into DATA_DIR that a fresh CT
# would regenerate). Hex chars keep db_password clear of percent-encoding in DATABASE_URL.
openwebui_db_password: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/openwebui_db_password chars=digits,abcdef length=48') }}"
openwebui_secret_key: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/openwebui_secret_key chars=digits,abcdef length=64') }}"

# HappyView secrets, same posture as the litellm/openwebui pairs above. db_password
# is the password for the `happyview` Postgres role; session_secret signs session
# cookies (64+ chars, must be stable across rebuilds — changing it invalidates all
# active sessions). token_encryption_key is a base64-encoded 32-byte key for
# encrypting OAuth tokens at rest; it CANNOT change once tokens are stored (no
# migration path — all connected accounts would need to re-authenticate). The
# `pipe` lookup generates it once via openssl and caches it in the secrets dir.
happyview_db_password: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/happyview_db_password chars=digits,abcdef length=48') }}"
happyview_session_secret: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/happyview_session_secret chars=ascii_letters,digits length=64') }}"
happyview_token_encryption_key: "{{ lookup('ansible.builtin.pipe', 'test -f ' ~ _zai_secrets_dir ~ '/happyview_token_key && cat ' ~ _zai_secrets_dir ~ '/happyview_token_key || (openssl rand -base64 32 | tr -d \"\\n\" | tee ' ~ _zai_secrets_dir ~ '/happyview_token_key)') }}"

# zai-auth secrets, same posture as the litellm/openwebui/happyview pairs above.
# db_password is the password for the `zai_auth` Postgres role; secret_key is
# Django's SECRET_KEY (signs sessions/CSRF — set explicitly so logins survive a
# rebuild); oidc_client_secret is the shared secret zai-auth and Open WebUI's
# OIDC client both need to agree on.
zai_auth_db_password: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/zai_auth_db_password chars=digits,abcdef length=48') }}"
zai_auth_secret_key: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/zai_auth_secret_key chars=ascii_letters,digits length=64') }}"
zai_auth_oidc_client_secret: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/zai_auth_oidc_client_secret chars=digits,abcdef length=48') }}"

# Password for the provision-time break-glass local admin (username `admin`,
# /admin/login/ only — no ATProto identity). DR-critical: it's the only way in
# if ATProto/OIDC login is ever broken, on par with the two signing keys below.
# Same generate-once-and-persist posture as every secret above — already rides
# the existing Tier-1 control-node backup of /root/.zai-secrets, no separate
# escrow path needed.
zai_auth_admin_password: "{{ lookup('ansible.builtin.password', _zai_secrets_dir ~ '/zai_auth_admin_password chars=ascii_letters,digits length=32') }}"

# zai-auth's two OAuth/OIDC signing keys (PKCS8 PEM) — the DR-critical items:
# losing ATPROTO_EC invalidates the atproto client_id's identity (every member
# re-consents), losing OIDC_RSA invalidates every id_token/session in flight.
# Generated ONCE with openssl (not the app's own `manage.py generate_keys`,
# whose docstring says production provisioning is a deployment-spec decision)
# and cached under /root/.zai-secrets like every secret above — so they ride
# the existing Tier-1 control-node backup for free instead of needing a new
# per-CT backup path. The `pipe` lookup idiom (generate-if-absent, else cat)
# matches happyview_token_encryption_key just above.
zai_auth_atproto_ec_key: "{{ lookup('ansible.builtin.pipe', 'test -f ' ~ _zai_secrets_dir ~ '/zai_auth_atproto_ec.pem && cat ' ~ _zai_secrets_dir ~ '/zai_auth_atproto_ec.pem || (openssl genpkey -algorithm EC -pkeyopt ec_paramgen_curve:P-256 -pkeyopt ec_param_enc:named_curve | tee ' ~ _zai_secrets_dir ~ '/zai_auth_atproto_ec.pem)') }}"
zai_auth_oidc_rsa_key: "{{ lookup('ansible.builtin.pipe', 'test -f ' ~ _zai_secrets_dir ~ '/zai_auth_oidc_rsa.pem && cat ' ~ _zai_secrets_dir ~ '/zai_auth_oidc_rsa.pem || (openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 | tee ' ~ _zai_secrets_dir ~ '/zai_auth_oidc_rsa.pem)') }}"
