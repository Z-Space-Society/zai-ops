---
# LiteLLM proxy — the cluster's OpenAI-compatible gateway in front of the
# inference nodes (llama-server) and any external providers. A Python app
# (litellm[proxy]) run natively from a dedicated venv under systemd; no Docker.
# Internal-only on vmbr1; reached from the LAN only through the Caddy edge.

# Pinned release. LiteLLM moves fast and its DB schema (Prisma) is version-coupled,
# so pin it and bump deliberately. Installed into the venv below as
# `litellm[proxy]=={{ litellm_version }}`.
# Releases: https://github.com/BerriAI/litellm/releases
litellm_version: "1.89.4"

# Prisma client (prisma-client-py). LiteLLM uses Prisma for its Postgres store but
# `litellm[proxy]` does NOT pull it — prisma lives in the `extra_proxy` extra, and
# even then the client must be generated + the schema migrated by hand (the Docker
# image does this at build; we're native, so the role does it — see tasks). Pinned:
# 0.15.0 is the newest prisma-client-py and the first to run on Python 3.13 (Debian
# 13's interpreter), though its trove classifiers only list ≤3.12. Bump with care.
litellm_prisma_version: "0.15.0"

# Port the proxy listens on. 4000 is LiteLLM's own default and what the Caddy
# route (caddy_proxy_hosts) assumes.
litellm_port: 4000

# Dedicated unprivileged service account (nologin) the daemon runs as.
litellm_user: litellm
litellm_group: litellm

# On-disk layout. The venv is self-contained under /opt so the app's Python deps
# never touch the system interpreter (Debian 13 / PEP 668 — see tasks).
litellm_home: /opt/litellm
litellm_venv: /opt/litellm/venv
litellm_bin: /opt/litellm/venv/bin/litellm

# Config + secret env live under /etc. config.yaml is non-secret (model routing);
# the env file (0600) carries DATABASE_URL + master key + STORE_MODEL_IN_DB.
litellm_config_dir: /etc/litellm
litellm_config_file: /etc/litellm/config.yaml
litellm_env_file: /etc/litellm/litellm.env

# Postgres role + database this role provisions on the postgres CT. The password
# is the auto-generated litellm_db_password from group_vars/all/main.yml (no manual
# step, stable across rebuilds); the DATABASE_URL is built from these plus
# hostvars['postgres'].ansible_host, so the DB IP is derived, never hardcoded.
litellm_db_name: litellm
litellm_db_user: litellm

# The Postgres DSN, built once from the parts above so the env template and the
# provision-time `prisma migrate deploy` use the identical string. The DB IP is
# derived from postgres's CTID via hostvars, never hardcoded.
litellm_database_url: "postgresql://{{ litellm_db_user }}:{{ litellm_db_password }}@{{ hostvars['postgres'].ansible_host }}:5432/{{ litellm_db_name }}"

# Where Prisma keeps its query-engine binary. Set identically at provision time
# (generate/migrate) and in the systemd unit, so the engine fetched once during
# provisioning is the one the daemon reads at runtime. Lives under litellm_home,
# which is inside the unit's ReadWritePaths.
litellm_prisma_cache: "{{ litellm_home }}/.cache"

# Environment shared by the provision-time Prisma commands (generate + migrate).
# venv/bin must lead PATH so the prisma CLI finds its `prisma-client-py` generator
# sidecar; the cache vars pin where the engine lands. No DATABASE_URL here — only
# `migrate` needs it, and it's added per-task (and no_log'd) to avoid leaking the
# password into generate's visible output.
litellm_prisma_env:
  PATH: "{{ litellm_venv }}/bin:{{ ansible_env.PATH | default('/usr/sbin:/usr/bin:/sbin:/bin') }}"
  HOME: "{{ litellm_home }}"
  XDG_CACHE_HOME: "{{ litellm_prisma_cache }}"
  PRISMA_BINARY_CACHE_DIR: "{{ litellm_prisma_cache }}/prisma-python/binaries"
  PRISMA_HIDE_UPDATE_MESSAGE: "1"
  PRISMA_SKIP_POSTINSTALL_GENERATE: "1"

# Model routing. Empty by default so the proxy starts clean; STORE_MODEL_IN_DB
# also lets models be added at runtime via the admin UI/API, persisted in Postgres.
# Each entry is a LiteLLM model_list item, rendered verbatim into config.yaml.
litellm_model_list: []
#  - model_name: llama-3.3-70b              # name clients request
#    litellm_params:
#      model: openai/llama-3.3-70b           # provider/route
#      api_base: "http://10.1.1.NNN:8080/v1" # an inference node's llama-server
#      api_key: "none"

# --- Floor embedder ---------------------------------------------------------
# An always-on, CPU-only `llama-server --embedding` co-located in THIS CT, giving
# the cluster a baseline embedding model that is up whenever litellm is — independent
# of the GPU inference nodes (which are intermittent). RAG clients (OpenWebUI) reach
# embeddings through litellm, so embeddings can never be more available than litellm
# anyway; co-locating makes the floor's availability == litellm's, with no extra
# failure domain. Bound to loopback; litellm's config.yaml routes the model_name here.
litellm_embedding_enabled: true
litellm_embedding_model_name: nomic-embed-text
litellm_embedding_port: 8090            # loopback only; MUST differ from litellm_port

# Prebuilt CPU llama.cpp release — a downloaded binary, NOT a source build, so the
# lean proxy CT never grows a C++ toolchain (the llama_server role builds from source
# only to autodetect a GPU's CUDA arch, which is irrelevant here). The ubuntu-x64
# asset is a CPU build; its binary + co-located .so libs extract FLAT under one
# versioned dir, which we strip to a stable dist/. Releases:
# https://github.com/ggml-org/llama.cpp/releases
llama_embed_release: "b9840"
llama_embed_binary_url: "https://github.com/ggml-org/llama.cpp/releases/download/{{ llama_embed_release }}/llama-{{ llama_embed_release }}-bin-ubuntu-x64.tar.gz"
llama_embed_binary_sha256: ""           # optional integrity pin (omit when empty)

llama_embed_dir: /opt/llama-embed
llama_embed_tarball: "{{ llama_embed_dir }}/llama-{{ llama_embed_release }}.tar.gz"
llama_embed_bin_dir: "{{ llama_embed_dir }}/dist"   # extracted binary + .so libs (flat)
llama_embed_server_bin: "{{ llama_embed_bin_dir }}/llama-server"

# nomic-embed-text-v1.5 GGUF — jurisdiction-clean (Nomic AI, US). Small enough
# (~274 MB f16) to fetch at provision time over the host NAT, unlike the multi-GB
# chat GGUFs staged by hand. Pinned to a commit revision so the URL is reproducible.
llama_embed_model_dir: "{{ llama_embed_dir }}/models"
llama_embed_model_repo: nomic-ai/nomic-embed-text-v1.5-GGUF
llama_embed_model_rev: "0188c9bf409793f810680a5a431e7b899c46104c"
llama_embed_model_file: nomic-embed-text-v1.5.f16.gguf
llama_embed_model_url: "https://huggingface.co/{{ llama_embed_model_repo }}/resolve/{{ llama_embed_model_rev }}/{{ llama_embed_model_file }}"
llama_embed_model_sha256: ""            # optional integrity pin (omit when empty)

# nomic supports 8192 tokens but llama.cpp defaults to 2048 unless rope-scaled
# (see the unit's yarn flags), so RAG chunks aren't silently truncated.
llama_embed_ctx: 8192

# The floor entry, prepended to litellm_model_list when rendering config.yaml. It
# points at 127.0.0.1 (host-agnostic), so it is a legitimate ROLE DEFAULT, not the
# this-cluster runtime routing that keeps litellm_model_list empty above. model_info
# mode:embedding marks the route so /v1/embeddings + the admin UI classify it right.
litellm_embedding_model_entry:
  - model_name: "{{ litellm_embedding_model_name }}"
    litellm_params:
      model: "openai/{{ litellm_embedding_model_name }}"
      api_base: "http://127.0.0.1:{{ litellm_embedding_port }}/v1"
      api_key: "none"
    model_info:
      mode: embedding
