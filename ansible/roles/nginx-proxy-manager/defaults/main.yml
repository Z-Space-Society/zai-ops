---
# Nginx Proxy Manager (NPM), built natively — no Docker (CLAUDE.md pinned decision).
# NPM ships only as a container image, so we assemble its pieces under systemd:
# OpenResty (its nginx), a Node backend, a built Vue frontend, and a SQLite DB.

# Pinned NPM release tag (without the leading 'v'). Never track "latest": the
# build is reproducible only against a fixed source tree. Bump deliberately.
npm_version: "2.15.1"

# Node comes from Debian (trixie ships nodejs 20.19.x): new enough to build the
# frontend (vite 8 needs Node >= 20.19) and run the backend (no engines constraint;
# Node 20 still ships --openssl-legacy-provider, which 22 dropped and the backend's
# runtime expects). No NodeSource — we'd only have needed it for an older major.
#
# yarn (classic) is NPM's package manager — both frontend and backend lock with
# yarn.lock, so the build installs with `yarn --frozen-lockfile` to reproduce the
# exact tested tree. Never pnpm/npm here: they ignore yarn.lock and float every dep
# to latest (an untested tree that breaks the build).
npm_yarn_version: "1.22.22"

# OpenResty apt suite. OpenResty does NOT publish a Debian 13 (trixie) repo yet
# (openresty/openresty#1054), so we pin its latest published codename, bookworm.
# Safe on trixie even though trixie dropped the EOL libpcre3: OpenResty bundles
# its own PCRE/OpenSSL (the openresty-pcre / openresty-openssl3 packages), so it
# doesn't pull the system libs trixie removed. Bump to trixie once it's published.
npm_openresty_suite: bookworm

# Where the install lands. /app holds the backend (NPM hardcodes this path);
# /data is the runtime state (SQLite DB + per-host nginx config + certs) and is
# the ONLY thing worth backing up — see the backup role's Tier-2 wiring.
npm_app_dir: /app
npm_data_dir: /data

# Source checkout + build scratch. The release tarball unpacks here; the backend
# is copied to /app and the frontend built and copied to /app/frontend.
npm_src_dir: /opt/nginx-proxy-manager
