<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — ZAI</title>
</head>
<body>
  <main>
    <h1>Sign in to ZAI</h1>
    <p>Use your ATProto handle (e.g. <code>alice.bsky.social</code>).</p>
    {% if error %}<p role="alert">{{ error }}</p>{% endif %}
    <form method="post" action="{% url 'atproto_oauth:login' %}">
      {% csrf_token %}
      <label for="handle">Handle</label>
      <input id="handle" name="handle" type="text" autocomplete="username"
             placeholder="alice.bsky.social" required>
      <button type="submit">Continue</button>
    </form>
  </main>
</body>
</html>
