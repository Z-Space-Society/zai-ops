---
# Caddy — the cluster's reverse-proxy edge. Routes are declarative and committed
# here (caddy_proxy_hosts), not held in a UI/SQLite DB, so the CT holds no
# unreproducible state (config in git, cert in the vault).

# Where the Cloudflare Origin CA cert/key land on the CT. The material itself is
# a secret and comes from the vault (cloudflare_origin_cert/_key); these are just
# the install paths the Caddyfile points its `tls` directive at.
caddy_cert_path: /etc/caddy/cloudflare-origin.pem
caddy_key_path: /etc/caddy/cloudflare-origin.key

# Origin TLS auto-enables once the Cloudflare Origin CA cert is in the vault. Until
# then the role stands Caddy up HTTP-only (proxying on :80) so the CT can be brought
# up and smoke-tested before the cert exists — add cloudflare_origin_cert/_key to
# the vault and re-run to flip on :443 + the :80→:443 redirect. Override to force.
caddy_tls_enabled: "{{ cloudflare_origin_cert is defined }}"

# Data-driven proxy routes — the reproducibility win. Each entry maps a
# public domain to an internal service; the upstream IP is DERIVED from that
# service's CTID via hostvars (10.1.1.<ctid>), never hardcoded — same convention
# the inventory uses. Empty by default: with no entries the Caddyfile still
# validates (the :80 health/redirect site below). Fill in as services come online
# and are assigned a CTID with `zai-assign`.
caddy_proxy_hosts: []
#  - { domain: chat.example.com, service: open-webui, port: 8080 }
#  - { domain: api.example.com,  service: litellm,    port: 4000 }
