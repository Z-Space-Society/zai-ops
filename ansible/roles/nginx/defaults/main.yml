---
# Reverse-proxy vhosts. Each entry renders an upstream + a server block:
#   - server_name: chat.example.com
#     upstream_host: "{{ hostvars['open-webui'].ansible_host }}"
#     upstream_port: 8080
# Reference upstreams by their derived ansible_host (10.1.1.<assigned-ctid>), not
# a pinned number. Empty by default — the upstreams (litellm, open-webui) don't
# exist yet. With no vhosts the role still produces a working nginx serving the
# health endpoint below, so the install is verifiable on its own.
nginx_vhosts: []

# Port the default health server listens on (returns 200 "ok" at /healthz).
nginx_health_port: 80
