---
# ZAI cluster inventory.
#
# The control node (CT 100) configures itself over a local connection, then
# uses the Proxmox API to create and configure the service containers below.
all:
  children:
    control_node:
      hosts:
        ct100:
          ansible_connection: local

    # Service containers — created by Ansible via the Proxmox API.
    # ansible_host (IP address) is filled in once each CT exists.
    services:
      hosts:
        ct101-nginx:
          ctid: 101
        ct102-postgres:
          ctid: 102
        ct103-litellm:
          ctid: 103
        ct104-open-webui:
          ctid: 104
